<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LEGO Interface B – Blockly</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Blockly core -->
  <script src="blockly/blockly_compressed.js"></script>
  <script src="blockly/blocks_compressed.js"></script>
  <script src="blockly/javascript_compressed.js"></script>
  <script src="blockly/msg/en.js"></script>

  <!-- Your LEGO blocks + generators -->
  <script src="blocks/lego_blocks.js"></script>
  <script src="blocks/lego_generators.js"></script>

  <!-- Multi‑device WebSerial engine -->
  <script src="js/webserial.js" defer></script>

  <!-- Code runner -->
  <script src="js/runner.js" defer></script>
</head>

<body>

  <!-- LEFT COLLAPSIBLE DEVICE PANE -->
  <div id="device-pane" class="device-pane expanded">
    <div id="device-pane-toggle" class="device-pane-toggle">«</div>

    <div class="device-pane-header">
      <span>Devices</span>
      <button id="disconnectAllBtn">Disconnect All</button>
    </div>

    <div id="device-list" class="device-list"></div>
  </div>

  <!-- MAIN AREA -->
  <div id="main-area">

    <div id="top-controls">
      <button id="connectLegoBBtn">Connect LEGO Interface B</button>
      <button id="runBtn">Run</button>
    </div>

    <div id="blocklyDiv"></div>
  </div>

  <!-- TOOLBOX -->
  <xml id="toolbox" style="display:none">

    <category name="Logic" colour="210">
      <block type="controls_if"></block>
      <block type="logic_compare"></block>
    </category>

    <category name="Loops" colour="120">
      <block type="controls_repeat_ext"></block>
      <block type="controls_whileUntil"></block>
    </category>

    <category name="Math" colour="230">
      <block type="math_number"></block>
      <block type="math_arithmetic"></block>
    </category>

    <category name="Variables" custom="VARIABLE" colour="330"></category>
    <category name="Functions" custom="PROCEDURE" colour="290"></category>

    <!-- LEGO category -->
    <category name="LEGO Interface B" colour="60">
      <block type="lego_connect"></block>
      <block type="lego_disconnect"></block>
      <block type="lego_set_output"></block>
      <block type="lego_read_packet"></block>
    </category>

  </xml>

  <!-- Blockly injection -->
  <script>
    const workspace = Blockly.inject('blocklyDiv', {
      toolbox: document.getElementById('toolbox')
    });

    // Old button replaced by new UI:
    // document.getElementById('connectBtn').onclick = () => lego.connect();

    document.getElementById('runBtn').onclick = () => runCode(workspace);
  </script>

</body>
</html>
